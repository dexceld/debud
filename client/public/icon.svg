<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="112" fill="#7C3AED"/>
  <!-- Subtle inner glow -->
  <rect width="512" height="512" rx="112" fill="url(#grad)" opacity="0.3"/>
  <defs>
    <radialGradient id="grad" cx="30%" cy="25%" r="70%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#4C1D95" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Coin circle -->
  <circle cx="256" cy="220" r="130" fill="#A78BFA" opacity="0.25"/>
  <circle cx="256" cy="220" r="110" fill="none" stroke="#EDE9FE" stroke-width="8"/>

  <!-- ₪ shekel symbol -->
  <text
    x="256" y="278"
    font-family="Arial, sans-serif"
    font-size="168"
    font-weight="900"
    text-anchor="middle"
    fill="#FFFFFF"
    letter-spacing="-4"
  >₪</text>

  <!-- Bar chart below -->
  <rect x="108" y="390" width="44" height="68" rx="8" fill="#C4B5FD" opacity="0.9"/>
  <rect x="168" y="358" width="44" height="100" rx="8" fill="#EDE9FE" opacity="0.9"/>
  <rect x="228" y="370" width="44" height="88" rx="8" fill="#C4B5FD" opacity="0.9"/>
  <rect x="288" y="340" width="44" height="118" rx="8" fill="#EDE9FE" opacity="0.9"/>
  <rect x="348" y="360" width="44" height="98" rx="8" fill="#C4B5FD" opacity="0.9"/>
</svg>
