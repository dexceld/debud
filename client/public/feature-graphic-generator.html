<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feature Graphic Generator - בשליטה</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            background: #f5f5f5;
        }
        h1 { color: #667eea; margin-bottom: 20px; }
        canvas {
            border: 2px solid #667eea;
            margin-bottom: 20px;
            max-width: 100%;
            height: auto;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }
        button:hover {
            opacity: 0.9;
        }
        .instructions {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            max-width: 600px;
        }
    </style>
</head>
<body>
    <h1>Feature Graphic Generator - בשליטה</h1>
    
    <canvas id="canvas" width="1024" height="500"></canvas>
    
    <button onclick="downloadPNG()">📥 הורד כ-PNG</button>
    
    <div class="instructions">
        <h3>הוראות:</h3>
        <ol>
            <li>לחצי על "הורד כ-PNG" למעלה</li>
            <li>שמרי את הקובץ</li>
            <li>ב-Google Play Console, לחצי "הוספת נכסים" בשדה Feature Graphic</li>
            <li>העלי את הקובץ שהורדת</li>
        </ol>
        <p><strong>גודל:</strong> 1024×500 פיקסלים ✓</p>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // Create gradient background
        const gradient = ctx.createLinearGradient(0, 0, 1024, 500);
        gradient.addColorStop(0, '#667eea');
        gradient.addColorStop(1, '#764ba2');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, 1024, 500);

        // Decorative circles
        ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
        
        // Circle 1 (top right)
        ctx.beginPath();
        ctx.arc(974, 50, 150, 0, Math.PI * 2);
        ctx.fill();
        
        // Circle 2 (bottom left)
        ctx.beginPath();
        ctx.arc(-30, 450, 100, 0, Math.PI * 2);
        ctx.fill();
        
        // Circle 3 (right middle)
        ctx.beginPath();
        ctx.arc(920, 250, 75, 0, Math.PI * 2);
        ctx.fill();

        // Icon
        ctx.font = '80px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('💰', 512, 180);

        // Title
        ctx.fillStyle = 'white';
        ctx.font = '800 72px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif';
        ctx.textAlign = 'center';
        ctx.shadowColor = 'rgba(0, 0, 0, 0.3)';
        ctx.shadowBlur = 20;
        ctx.shadowOffsetX = 0;
        ctx.shadowOffsetY = 4;
        ctx.fillText('בשליטה', 512, 280);

        // Subtitle
        ctx.font = '600 32px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif';
        ctx.shadowBlur = 10;
        ctx.shadowOffsetY = 2;
        ctx.fillText('Excel Your Money', 512, 330);

        // Tagline
        ctx.font = '500 20px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif';
        ctx.shadowBlur = 0;
        ctx.fillStyle = 'rgba(255, 255, 255, 0.85)';
        ctx.fillText('ניהול תקציב חכם', 512, 370);

        function downloadPNG() {
            const link = document.createElement('a');
            link.download = 'feature-graphic-1024x500.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        }
    </script>
</body>
</html>
