<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feature Graphic - בשליטה</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f0f0f0;
        }
        .feature-graphic {
            width: 1024px;
            height: 500px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            position: relative;
            overflow: hidden;
        }
        .icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
        .title {
            font-size: 72px;
            font-weight: 800;
            margin-bottom: 16px;
            text-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .subtitle {
            font-size: 32px;
            font-weight: 600;
            opacity: 0.95;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }
        .tagline {
            font-size: 20px;
            margin-top: 24px;
            opacity: 0.85;
        }
        /* Decorative circles */
        .circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
        }
        .circle1 {
            width: 300px;
            height: 300px;
            top: -100px;
            right: -50px;
        }
        .circle2 {
            width: 200px;
            height: 200px;
            bottom: -50px;
            left: -30px;
        }
        .circle3 {
            width: 150px;
            height: 150px;
            top: 50%;
            right: 10%;
        }
    </style>
</head>
<body>
    <div class="feature-graphic">
        <div class="circle circle1"></div>
        <div class="circle circle2"></div>
        <div class="circle circle3"></div>
        <div class="icon">💰</div>
        <div class="title">בשליטה</div>
        <div class="subtitle">Excel Your Money</div>
        <div class="tagline">ניהול תקציב חכם</div>
    </div>
</body>
</html>
