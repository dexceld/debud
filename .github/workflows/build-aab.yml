name: Build AAB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android.keystore

      - name: Configure Bubblewrap
        run: |
          mkdir -p ~/.bubblewrap
          SDK_PATH="${ANDROID_HOME:-$ANDROID_SDK_ROOT}"
          echo "JDK: $JAVA_HOME"
          echo "SDK: $SDK_PATH"
          printf '{"jdkPath":"%s","androidSdkPath":"%s"}' "$JAVA_HOME" "$SDK_PATH" > ~/.bubblewrap/config.json
          cat ~/.bubblewrap/config.json

      - name: Install expect
        run: sudo apt-get install -y expect

      - name: Build AAB
        run: |
          expect -c "
            spawn bubblewrap build
            expect -re {password} { send \"$env(KS_PASS)\r\" }
            expect -re {password} { send \"$env(KS_PASS)\r\" }
            expect eof
          "
        env:
          KS_PASS: ${{ secrets.KEYSTORE_PASSWORD }}

      - name: Find AAB
        run: find . -name "*.aab" 2>/dev/null || echo "No AAB found"

      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-signed
          path: "**/*.aab"
          retention-days: 7
