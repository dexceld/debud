name: Build AAB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK Platform 36
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android.keystore

      - name: Configure Bubblewrap
        run: |
          mkdir -p ~/.bubblewrap
          SDK_PATH="${ANDROID_HOME:-$ANDROID_SDK_ROOT}"
          echo "JDK: $JAVA_HOME"
          echo "SDK: $SDK_PATH"
          printf '{"jdkPath":"%s","androidSdkPath":"%s"}' "$JAVA_HOME" "$SDK_PATH" > ~/.bubblewrap/config.json
          cat ~/.bubblewrap/config.json

      - name: Verify Keystore
        run: |
          echo "Keystore size: $(wc -c < android.keystore) bytes"
          file android.keystore
          keytool -list -keystore android.keystore -storepass "$KS_PASS" 2>&1 || echo "KEYSTORE_ERROR"
        env:
          KS_PASS: ${{ secrets.KEYSTORE_PASSWORD }}

      - name: Install expect
        run: sudo apt-get install -y expect

      - name: Pre-place google-services.json
        run: |
          mkdir -p android-project/app
          cp android-config/google-services.json android-project/app/google-services.json
          echo "google-services.json placed in android-project/app/"

      - name: Build AAB
        run: |
          KS_CLEAN=$(printf '%s' "$KS_PASS" | tr -d '\r\n')
          export KS_CLEAN
          expect << 'EXPECT_EOF'
            set timeout 600
            set kspass $::env(KS_CLEAN)
            spawn bubblewrap build
            expect {
              -re {\(Y/n\)} { send "Y\r"; exp_continue }
              -re {versionName} { send "1.0.4\r"; exp_continue }
              -re {versionCode} { send "6\r"; exp_continue }
              -nocase -re {password} { send "$kspass\r"; exp_continue }
              timeout { puts "EXPECT_TIMEOUT"; exit 1 }
              eof {}
            }
            lassign [wait] pid spawnid os_error_flag value
            exit $value
          EXPECT_EOF
        env:
          KS_PASS: ${{ secrets.KEYSTORE_PASSWORD }}

      - name: Find AAB
        if: always()
        run: |
          echo "=== Searching for AAB files ==="
          find /home/runner /tmp /root -name "*.aab" 2>/dev/null | head -20 || echo "No AAB found anywhere"
          echo "=== Current directory contents ==="
          ls -la
          echo "=== android-project if exists ==="
          find . -type d -name "app" 2>/dev/null | head -5
          ls -la android-project/ 2>/dev/null || echo "No android-project dir"

      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-signed
          path: "**/*.aab"
          retention-days: 7
