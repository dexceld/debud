services:
  - type: static
    name: debud
    runtime: static
    buildCommand: npm install --include=dev && npm run build -w client
    staticPublishPath: ./client/dist
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: development
    headers:
      - path: /.well-known/assetlinks.json
        name: Content-Type
        value: application/json
